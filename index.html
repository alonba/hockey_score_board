<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="stylesheet" href="styles.css">
    <title>Rink Hockey Scoreboard</title>
</head>

<body>
    <noscript>
        <div style="padding: 20px; text-align: center; color: white; background-color: #ef4444;">
            Please enable JavaScript to use the Scoreboard.
        </div>
    </noscript>

    <div class="top-bar">
        <button id="btnOpenSetup" class="pill-btn icon-btn" title="Match Settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg>
        </button>

        <div class="period-display" id="periodDisplay">1st Half</div>

        <div class="toolbar-actions">
            <button id="btnUndo" class="pill-btn btn-undo icon-btn" title="Undo Action">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 7v6h6"></path>
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                </svg>
            </button>
            <button id="btnOpenTimeout" class="pill-btn btn-timeout icon-btn" title="Timeout">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
        </div>
    </div>

    <div class="timer-container">
        <div class="timer paused" id="timerDisplay">25:00</div>
    </div>

    <div class="scoreboard">
        <div class="team-card" id="cardA">
            <div class="team-header">
                <div class="team-color-line" id="colorLineA"></div>
                <div class="team-name" id="nameA">HOME</div>
            </div>
            <div class="score" id="scoreA">0</div>

            <div class="penalties-container" id="penaltiesA"></div>

            <div class="foul-section" id="foulSectionA">
                <div class="foul-header">
                    <div class="foul-title">Team Fouls</div>
                    <div><span class="foul-numbers" id="foulsA">0</span><span class="foul-threshold" id="foulMaxA"> /
                            10</span></div>
                </div>
                <div class="foul-bar-bg">
                    <div class="foul-bar-fill" id="foulBarA" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="team-card" id="cardB">
            <div class="team-header">
                <div class="team-color-line" id="colorLineB"></div>
                <div class="team-name" id="nameB">AWAY</div>
            </div>
            <div class="score" id="scoreB">0</div>

            <div class="penalties-container" id="penaltiesB"></div>

            <div class="foul-section" id="foulSectionB">
                <div class="foul-header">
                    <div class="foul-title">Team Fouls</div>
                    <div><span class="foul-numbers" id="foulsB">0</span><span class="foul-threshold" id="foulMaxB"> /
                            10</span></div>
                </div>
                <div class="foul-bar-bg">
                    <div class="foul-bar-fill" id="foulBarB" style="width: 0%;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="announcement" class="announcement">
        <div id="annText"></div>
    </div>

    <div id="timeoutModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title timeout-title">Timeout</div>
            <div class="timeout-clock" id="timeoutDisplay">60</div>
            <button id="btnCloseTimeout" class="btn-primary w-100">Resume Game</button>
        </div>
    </div>

    <div id="setupModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">Match Settings</div>

            <div class="time-settings">
                <div class="form-group mb-0"><label class="text-center">Main Clock</label>
                    <div class="time-inputs"><input type="number" id="inputMin" value="25" min="0" max="99"><span
                            class="time-separator">:</span><input type="number" id="inputSec" value="00" min="0"
                            max="59"></div>
                </div>
                <div class="divider-vertical"></div>
                <div class="form-group mb-0"><label class="text-center">Halftime (Min)</label>
                    <div class="time-inputs"><input type="number" id="inputBreakMin" value="5" min="1" max="30"></div>
                </div>
                <div class="divider-vertical"></div>
                <div class="form-group mb-0"><label class="text-center">Timeout (Sec)</label>
                    <div class="time-inputs"><input type="number" id="inputTimeoutSec" value="60" min="1" max="999">
                    </div>
                </div>
            </div>

            <div class="setup-grid">
                <div>
                    <h3 class="setup-section-title">Team 1 (Left)</h3>
                    <div class="preset-container">
                        <div class="form-group mb-0">
                            <label>Load Preset Team</label>
                            <select id="presetA">
                                <option value="">-- Custom Team --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label>Name</label><input type="text" id="inputNameA"></div>
                    <div class="form-group"><label>Color</label><input type="color" id="inputColorA"></div>
                    <div class="form-group"><label>Players (comma separated)</label><input type="text"
                            id="inputPlayersA"></div>
                </div>

                <div>
                    <h3 class="setup-section-title">Team 2 (Right)</h3>
                    <div class="preset-container">
                        <div class="form-group mb-0">
                            <label>Load Preset Team</label>
                            <select id="presetB">
                                <option value="">-- Custom Team --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label>Name</label><input type="text" id="inputNameB"></div>
                    <div class="form-group"><label>Color</label><input type="color" id="inputColorB"></div>
                    <div class="form-group"><label>Players (comma separated)</label><input type="text"
                            id="inputPlayersB"></div>
                </div>
            </div>

            <div class="btn-row">
                <button id="btnCloseSetup" class="btn-secondary">Cancel</button>
                <button id="btnApplySetup" class="btn-primary">Apply Changes</button>
            </div>

            <h3 class="setup-section-title log-title">Game Log & Export</h3>
            <div class="match-log" id="matchLogDisplay"></div>
            <button id="btnDownloadJson" class="btn-info">Download Match Data (.json)</button>
            <button id="btnHardReset" class="btn-danger">Reset Entire Game</button>
        </div>
    </div>

    <div id="actionModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="actionModalTitle">Select Player</div>
            <div id="playerGrid" class="player-grid"></div>
            <button id="skipBtnPlayer" class="btn-secondary w-100 mb-15" style="display:none;">Team Foul (No
                Player)</button>
            <button id="skipBtnAssist" class="btn-secondary w-100 mb-15" style="display:none;">No Assist</button>

            <div id="foulTypeGrid" class="foul-type-grid" style="display:none;">
                <button id="btnFoulStd" class="btn-card std">Standard Foul (+1 Team Foul)</button>
                <button id="btnCardYellow" class="btn-card y">🟨 Yellow (No Foul)</button>
                <button id="btnCardYellowFoul" class="btn-card y-f">🟨 Yellow (+1 Foul)</button>
                <button id="btnCardBlue" class="btn-card b">🟦 Blue (No Foul)</button>
                <button id="btnCardBlueFoul" class="btn-card b-f">🟦 Blue (+1 Foul)</button>
                <button id="btnCardRed" class="btn-card r">🟥 Red (No Foul)</button>
                <button id="btnCardRedFoul" class="btn-card r-f">🟥 Red (+1 Foul)</button>
            </div>
            <button id="btnCancelAction" class="btn-danger mt-0">Cancel</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 450px; padding: 35px;">
            <div class="modal-title" id="confirmModalTitle" style="font-size: 1.8rem; margin-bottom: 25px;">Are you
                sure?</div>
            <div class="btn-row" style="margin-top: 10px;">
                <button id="btnConfirmCancel" class="btn-secondary">Cancel</button>
                <button id="btnConfirmOk" class="btn-primary" style="background: var(--accent-red);">Confirm</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
